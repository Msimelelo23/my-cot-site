<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COT Data Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gold COT Report</h1>
        <p>Data updates automatically every Friday via GitHub Actions.</p>
        
        <div id="loading">Loading data...</div>
        <div id="error" style="color: red; display: none;"></div>
        
        <table id="cot-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Open Interest</th>
                    <th>Producer Long</th>
                    <th>Producer Short</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
